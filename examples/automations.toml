# Example gukab automations.
# Copy to ~/.config/gukab/automations.toml and edit.
#
# These macros are available in EVERY session via the Ctrl+A macro picker.
# A macro's `expects` arm only when the macro is run via a host's `on_connect`
# (see hosts.toml) — they never fire globally on their own.

# Simple macro: type "en" in the picker to send "enable" + Enter.
[[macros]]
key = "en"
send = "enable"

  # When "en" runs on connect, answer the enable-password prompt from the keychain.
  [[macros.expects]]
  pattern = "[Pp]assword:"
  send_credential = "enable"   # keychain entry name; store it with Ctrl+K
  once = false

# Multi-line macro: each non-empty line is sent as its own Enter-terminated command.
[[macros]]
key = "port-access"
send = """
configure terminal
interface range Gi1/0/1 - 24
switchport mode access
end
"""

# A macro that sends a literal string.
[[macros]]
key = "wr"
send = "write memory"
