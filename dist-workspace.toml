[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Also ship a standalone updater so users can self-update (`gukab-update`),
# brew-upgrade style, without re-running the install one-liner.
install-updater = true
# Target platforms to build apps for (Rust target-triple syntax).
# Project supports Arch Linux x86_64, Windows 10 1809+ x86_64 (the .exe
# static-links the MSVC CRT via .cargo/config.toml), and macOS (Intel + Apple Silicon).
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
]
# Install to ~/.local/bin (XDG-style, neutral) instead of ~/.cargo/bin — gukab is
# a standalone binary, not a cargo-installed dev tool.
install-path = "~/.local/bin"

# System build dependencies. `serialport` links libudev on Linux for serial-port
# enumeration; the CI runner needs the dev package or the Linux build fails.
[dist.dependencies.apt]
libudev-dev = '*'
