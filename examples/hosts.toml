# Example gukab host inventory.
# Copy to ~/.config/gukab/hosts.toml and edit.
#
# Passwords are NEVER stored here — they live in the OS keychain. Each host
# references a keychain entry by name via `credential_ref`; add the secret in the
# TUI with Ctrl+K (or `security add-generic-password -s gukab -a <ref> -w <pass>`).
#
# SSH key auth: set `identity_file` to a private key path (`~` is expanded). Only
# the path is stored — never the key itself. If the key is passphrase-protected,
# put the passphrase in the keychain (Ctrl+K) and name it in `credential_ref`; a
# passphrase-less key leaves `credential_ref` empty.

# ---- Groups (optional) -------------------------------------------------------
# Each group is a collapsible header in the host list. `icon` is any glyph you
# paste — a Nerd Font symbol, an emoji, or leave it "" for none.
[[groups]]
name = "Core"
icon = ""          # e.g. paste a Nerd Font glyph or an emoji like 🏢

[[groups]]
name = "Access"
icon = ""

# ---- Hosts -------------------------------------------------------------------
[[hosts]]
name = "core-sw-01"        # label shown in the list
hostname = "10.0.0.1"      # IP or DNS name
port = 22                  # optional, defaults to 22
username = "admin"
credential_ref = "core"    # keychain entry holding this host's password
group = "Core"             # optional; omit for an ungrouped host

# A host that auto-runs a macro right after connecting (see automations.toml "en").
# Running a macro on connect also arms that macro's expect rules for the session.
[[hosts]]
name = "dist-sw-01"
hostname = "10.0.2.1"
username = "admin"
credential_ref = "core"
group = "Access"
on_connect = ["en"]        # macro keys to run on connect

# A host authenticated with an SSH key instead of a password. The key file stays
# on disk; gukab only stores the path. Passphrase-less here (credential_ref omitted).
[[hosts]]
name = "edge-rtr-01"
hostname = "10.0.3.1"
username = "netops"
identity_file = "~/.ssh/id_ed25519"
group = "Core"

# Same, but the key is passphrase-protected: store the passphrase with Ctrl+K under
# a name (e.g. "edge-key") and reference it here.
[[hosts]]
name = "edge-rtr-02"
hostname = "10.0.3.2"
username = "netops"
identity_file = "~/.ssh/id_edge"
credential_ref = "edge-key"   # keychain entry holding the key's passphrase
group = "Core"

# A host with its OWN macros and expect rules (in addition to the global ones).
[[hosts]]
name = "lab-sw-03"
hostname = "10.0.1.23"
username = "admin"
credential_ref = "lab"
group = "Access"

  [[hosts.macros]]
  key = "uptime"
  send = "show version | include uptime"

  # A host's own expect rules are armed for its session: when `pattern` (a regex)
  # appears in the output, gukab auto-sends the response — at most once.
  [[hosts.expects]]
  pattern = "[Pp]assword:"
  send_credential = "enable"   # reads keychain entry "enable" at match time
